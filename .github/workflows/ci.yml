  app:
    name: App Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: application
        run: npm install

      - name: Lint
        working-directory: application
        run: npm run lint

      - name: Test
        working-directory: application
        run: npm test
