name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  AWS_REGION: eu-central-1
  TF_DIR: terraform

jobs:
  terraform:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request'"
    outputs:
      env: ${{ steps.env.outputs.env }}
      backend: ${{ steps.env.outputs.backend }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BASE=${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}
          if [ "$BASE" == "main" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/prd.hcl" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/dev.hcl" >> $GITHUB_OUTPUT
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ steps.env.outputs.backend }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var="env=${{ steps.env.outputs.env }}" -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_DIR }}
          soft_fail: true

  app:
    name: App Lint & Test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: application
        run: npm install

      - name: Lint
        working-directory: application
        run: npm run lint

      - name: Test
        working-directory: application
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [app]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ needs.terraform.outputs.backend }}

      - name: Cleanup stale CloudWatch log group
        run: |
          aws logs delete-log-group \
            --log-group-name "/aws/eks/eks-rm565486-${{ needs.terraform.outputs.env }}/cluster" \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var="env=${{ needs.terraform.outputs.env }}"

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENV: ${{ needs.terraform.outputs.env }}
        run: |
          IMAGE=$REGISTRY/rm565486-app
          docker build -t $IMAGE:$IMAGE_TAG ./application
          docker push $IMAGE:$IMAGE_TAG
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:$ENV-latest
          docker push $IMAGE:$ENV-latest
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - uses: imranismail/setup-kustomize@v2

      - name: Update image tag in overlay
        env:
          ENV: ${{ needs.terraform.outputs.env }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          cd k8s/overlays/$ENV
          kustomize edit set image rm565486-app=$IMAGE

      - name: Commit updated manifest
        env:
          ENV: ${{ needs.terraform.outputs.env }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/$ENV/kustomization.yaml
          git commit -m "chore($ENV): update image to ${{ github.sha }} [skip ci]"
          git push
