name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev or prd)"
        required: true
        type: choice
        options:
          - dev
          - prd

env:
  AWS_REGION: eu-central-1
  TF_DIR: terraform

jobs:
  destroy:
    name: Terraform Destroy (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Set backend config
        id: cfg
        run: |
          ENV=${{ github.event.inputs.environment }}
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "backend=backend-configs/$ENV.hcl" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ steps.cfg.outputs.backend }}

      - name: Release stale state lock
        run: |
          aws dynamodb delete-item \
            --table-name rm565486-tflock \
            --key "{\"LockID\": {\"S\": \"rm565486-tfstate/terraform/${{ steps.cfg.outputs.env }}/terraform.tfstate\"}}" \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Destroy
        working-directory: ${{ env.TF_DIR }}
        run: terraform destroy -auto-approve -var="env=${{ steps.cfg.outputs.env }}"
