name: CD

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: eu-central-1
  TF_DIR: terraform

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # Ignora commits automáticos do próprio pipeline (atualização de manifests)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/prd.hcl" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/dev.hcl" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Terraform ────────────────────────────────────────────────
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ steps.env.outputs.backend }}

      - name: Cleanup stale CloudWatch log group
        run: |
          aws logs delete-log-group \
            --log-group-name "/aws/eks/eks-rm565486-${{ steps.env.outputs.env }}/cluster" \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var="env=${{ steps.env.outputs.env }}"

      # ── Docker Build & Push ───────────────────────────────────────
      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENV: ${{ steps.env.outputs.env }}
        run: |
          IMAGE=$REGISTRY/rm565486-app
          docker build -t $IMAGE:$IMAGE_TAG ./application
          docker push $IMAGE:$IMAGE_TAG
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:$ENV-latest
          docker push $IMAGE:$ENV-latest
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Atualiza manifest → ArgoCD detecta e sincroniza ──────────
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag in overlay
        env:
          ENV: ${{ steps.env.outputs.env }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          cd k8s/overlays/$ENV
          kustomize edit set image rm565486-app=$IMAGE

      - name: Commit updated manifest
        env:
          ENV: ${{ steps.env.outputs.env }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/$ENV/kustomization.yaml
          git commit -m "chore($ENV): update image to ${{ github.sha }} [skip ci]"
          git push
