name: CI/CD App

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "application/**"
      - ".github/workflows/ci-cd-app.yaml"
  push:
    branches: [main, develop]
    paths:
      - "application/**"
      - ".github/workflows/ci-cd-app.yaml"

env:
  AWS_REGION: eu-central-1

jobs:
  continuous-integration:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: application
        run: npm install

      - name: Lint
        working-directory: application
        run: npm run lint

      - name: Test
        working-directory: application
        run: npm test

  continuous-deployment:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: [continuous-integration]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: ${{ github.ref_name }}

      - name: Determine environment
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" == "main" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          ENV: ${{ steps.env.outputs.env }}
        run: |
          IMAGE=$REGISTRY/rm565486-app
          docker build -t $IMAGE:$IMAGE_TAG ./application
          docker push $IMAGE:$IMAGE_TAG
          docker tag $IMAGE:$IMAGE_TAG $IMAGE:$ENV-latest
          docker push $IMAGE:$ENV-latest
          echo "image=$IMAGE:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - uses: imranismail/setup-kustomize@v2

      - name: Update image tag in overlay
        env:
          ENV: ${{ steps.env.outputs.env }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          cd k8s/overlays/$ENV
          kustomize edit set image rm565486-app=$IMAGE

      - name: Commit updated manifest
        env:
          ENV: ${{ steps.env.outputs.env }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/$ENV/kustomization.yaml
          git commit -m "chore($ENV): update image to ${{ github.sha }} [skip ci]" || exit 0
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin HEAD:"$GITHUB_REF_NAME"
