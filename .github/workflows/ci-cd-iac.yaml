name: CI/CD IaC

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "terraform/**"
      - ".github/workflows/ci-cd-iac.yaml"
  push:
    branches: [main, develop]
    paths:
      - "terraform/**"
      - ".github/workflows/ci-cd-iac.yaml"

env:
  AWS_REGION: eu-central-1
  TF_DIR: terraform

jobs:
  continuous-integration:
    name: Terraform Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BASE=${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}
          if [ "$BASE" == "main" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/prd.hcl" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/dev.hcl" >> $GITHUB_OUTPUT
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ steps.env.outputs.backend }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: terraform plan -var="env=${{ steps.env.outputs.env }}" -no-color
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ${{ env.TF_DIR }}
          soft_fail: true

  continuous-deployment:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "$GITHUB_REF_NAME" == "main" ]; then
            echo "env=prd" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/prd.hcl" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "backend=backend-configs/dev.hcl" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=${{ steps.env.outputs.backend }}

      - name: Cleanup stale CloudWatch log group
        run: |
          aws logs delete-log-group \
            --log-group-name "/aws/eks/eks-rm565486-${{ steps.env.outputs.env }}/cluster" \
            --region ${{ env.AWS_REGION }} || true

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve -var="env=${{ steps.env.outputs.env }}"
